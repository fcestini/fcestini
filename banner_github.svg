<svg width="1400" height="400" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .radar-ring-1 { animation: radar-pulse 4s ease-out infinite; }
      .radar-ring-2 { animation: radar-pulse 4s ease-out infinite 1.3s; }
      .radar-ring-3 { animation: radar-pulse 4s ease-out infinite 2.6s; }
      .radar-dot-center { animation: dot-ping 4s ease-out infinite; }
      .radar-dot-outer-1 { animation: dot-fade 4s ease-in-out infinite 0.8s; }
      .radar-dot-outer-2 { animation: dot-fade 4s ease-in-out infinite 2.1s; }
      .radar-dot-outer-3 { animation: dot-fade 4s ease-in-out infinite 3.2s; }
      .accent-bar { animation: bar-glow 3s ease-in-out infinite alternate; }

      @keyframes radar-pulse {
        0%   { r: 10; opacity: 0.5; }
        60%  { r: 90; opacity: 0.12; }
        100% { r: 100; opacity: 0; }
      }
      @keyframes dot-ping {
        0%, 100% { opacity: 1; r: 6; }
        50%       { opacity: 0.6; r: 4; }
      }
      @keyframes dot-fade {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 0.15; }
      }
      @keyframes bar-glow {
        0%   { opacity: 0.7; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="200" fill="#0D2137"/>

  <!-- Grid lines -->
  <line x1="0" y1="40"  x2="680" y2="40"  stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="0" y1="80"  x2="680" y2="80"  stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="680" y2="120" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="680" y2="160" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="500" y1="0" x2="500" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#1a3a5c" stroke-width="0.5"/>

  <!-- Accent bar esquerda -->
  <rect class="accent-bar" x="0" y="0" width="5" height="200" fill="#34D399"/>

  <!-- Radar animado -->
  <circle class="radar-ring-1" cx="590" cy="100" r="10" fill="none" stroke="#34D399" stroke-width="1"/>
  <circle class="radar-ring-2" cx="590" cy="100" r="10" fill="none" stroke="#34D399" stroke-width="1"/>
  <circle class="radar-ring-3" cx="590" cy="100" r="10" fill="none" stroke="#34D399" stroke-width="1"/>

  <!-- Ponto central pulsando -->
  <circle class="radar-dot-center" cx="590" cy="100" r="6" fill="#34D399"/>

  <!-- Pontos orbitais -->
  <circle class="radar-dot-outer-1" cx="640" cy="55"  r="3" fill="#34D399"/>
  <circle class="radar-dot-outer-2" cx="555" cy="148" r="3" fill="#34D399"/>
  <circle class="radar-dot-outer-3" cx="625" cy="138" r="2" fill="#34D399"/>

  <!-- Label topo -->
  <text x="28" y="38" font-family="monospace" font-size="11" fill="#34D399" letter-spacing="3" opacity="0.9">GP2TECH SOLUÇÕES EM TECNOLOGIA</text>

  <!-- Nome principal -->
  <text x="28" y="102" font-family="monospace" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="1">Fabio Cestini</text>

  <!-- Linha separadora -->
  <rect x="28" y="114" width="320" height="2" fill="#34D399" rx="1"/>

  <!-- Título -->
  <text x="28" y="142" font-family="monospace" font-size="15" fill="#34D399" letter-spacing="1">Arquiteto de Soluções &amp; Automação</text>

  <!-- Tech tags -->
  <rect x="28"  y="158" width="68" height="22" fill="#1a3a5c" rx="4"/>
  <text x="62"  y="173" font-family="monospace" font-size="11" fill="#34D399" text-anchor="middle">PHP</text>

  <rect x="104" y="158" width="68" height="22" fill="#1a3a5c" rx="4"/>
  <text x="138" y="173" font-family="monospace" font-size="11" fill="#34D399" text-anchor="middle">React</text>

  <rect x="180" y="158" width="68" height="22" fill="#1a3a5c" rx="4"/>
  <text x="214" y="173" font-family="monospace" font-size="11" fill="#34D399" text-anchor="middle">N8N</text>

  <rect x="256" y="158" width="68" height="22" fill="#1a3a5c" rx="4"/>
  <text x="290" y="173" font-family="monospace" font-size="11" fill="#34D399" text-anchor="middle">Docker</text>

  <rect x="332" y="158" width="68" height="22" fill="#1a3a5c" rx="4"/>
  <text x="366" y="173" font-family="monospace" font-size="11" fill="#34D399" text-anchor="middle">Linux</text>

  <!-- Site rodapé -->
  <text x="652" y="185" font-family="monospace" font-size="11" fill="#34D399" text-anchor="end" opacity="0.6">gp2tech.com.br</text>
</svg>
